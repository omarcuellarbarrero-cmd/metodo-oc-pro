<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estación de Diagnóstico</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #2a2a2a; padding: 20px; border-radius: 15px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; background: #333; color: white; border: 1px solid #444; }
        button { width: 100%; padding: 15px; background: #ff9800; border: none; color: white; font-weight: bold; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; background: #333; border-left: 5px solid #ff9800; }
    </style>
    <div class="header-nav">
    <img src="logo-oc.png" alt="Logo OC" class="logo-small">
    <button onclick="localStorage.clear(); window.location.href='index.html';" class="btn-nav">
        <i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión
    </button>
</div>

<style>
    .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .logo-small { max-width: 80px; }
    .btn-nav { background: none; border: none; color: #ff9800; cursor: pointer; }
</style>
</head>
<body>
<div class="container">
    <h2>Estación de Diagnóstico</h2>
    <input id="marca" placeholder="Marca">
    <input id="modelo" placeholder="Modelo">
    <input id="sintoma" placeholder="Síntoma">
    <textarea id="descartes" placeholder="Descartes realizados"></textarea>
    <button id="btn" onclick="consultarIA()">SOLICITAR DIAGNÓSTICO</button>
    <div id="result">Esperando diagnóstico...</div>
</div>

<script>
    async function consultarIA() {
        const btn = document.getElementById('btn');
        btn.disabled = true; btn.innerText = "Consultando...";
        
        const payload = {
            marca: document.getElementById('marca').value,
            modelo: document.getElementById('modelo').value,
            sintoma: document.getElementById('sintoma').value,
            descartes: document.getElementById('descartes').value,
            usuario: localStorage.getItem('usuarioOC') || 'Colega'
        };

        const res = await fetch('/api/diagnostico', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        document.getElementById('result').innerText = data.text;
        btn.disabled = false; btn.innerText = "SOLICITAR DIAGNÓSTICO";
    }
</script>
</body>
</html>
