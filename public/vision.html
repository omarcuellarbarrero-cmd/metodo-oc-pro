<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OC Vision Scanner - Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #0d1117; 
            color: white; 
            margin: 0; 
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container { 
            max-width: 600px; 
            width: 100%; 
            background: #161b22; 
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* HEADER LIMPIO */
        .header-vision {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255, 152, 0, 0.2);
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-oc { max-width: 45px; height: auto; }
        .main-title {
            color: #ff9800;
            font-size: 1.3em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }
        .btn-home {
            color: #ff9800;
            text-decoration: none;
            font-size: 1.4em;
            transition: 0.3s;
        }
        .btn-home:hover { transform: scale(1.1); color: white; }

        /* ÁREA DE CARGA */
        .upload-area {
            border: 2px dashed #30363d;
            padding: 40px 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover { border-color: #ff9800; background: #1c2128; }
        .upload-area i { font-size: 3em; color: #ff9800; margin-bottom: 10px; }
        
        #preview { 
            width: 100%; 
            max-height: 300px; 
            object-fit: contain; 
            display: none; 
            border-radius: 10px; 
            margin-top: 15px; 
        }

        .btn-scan {
            width: 100%;
            padding: 15px;
            background: #ff9800;
            border: none;
            color: black;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            text-transform: uppercase;
        }
        .btn-scan:disabled { background: #444; color: #888; cursor: not-allowed; }

        #result {
            margin-top: 25px;
            padding: 20px;
            background: #0d1117;
            border-left: 4px solid #ff9800;
            border-radius: 8px;
            display: none;
            line-height: 1.6;
            font-size: 0.95em;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-vision">
        <div class="logo-container">
            <img src="logo-oc.png" alt="OC" class="logo-oc">
            <h1 class="main-title">Vision Scanner</h1>
        </div>
        <a href="index.html" class="btn-home"><i class="fa-solid fa-house"></i></a>
    </div>

    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <i class="fa-solid fa-camera"></i>
        <p>Toca para subir foto de la tarjeta o componente</p>
        <input type="file" id="fileInput" hidden accept="image/*" onchange="handleFile(this)">
        <img id="preview">
    </div>

    <button id="scanBtn" class="btn-scan" onclick="startScan()" disabled>
        Iniciar Escaneo IA
    </button>

    <div id="result"></div>
</div>

<script>
    // Bloqueo de click derecho
    document.addEventListener('contextmenu', e => e.preventDefault());

    function handleFile(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('preview');
                preview.src = e.target.result;
                preview.style.display = 'block';
                document.getElementById('scanBtn').disabled = false;
            }
            reader.readAsDataURL(file);
        }
    }

    async function startScan() {
        const resultDiv = document.getElementById('result');
        const btn = document.getElementById('scanBtn');
        
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = "<i class='fas fa-sync fa-spin'></i> Analizando imagen con Vision AI...";
        btn.disabled = true;

        // Aquí iría tu lógica de envío a la API que ya tienes configurada
        setTimeout(() => {
            resultDiv.innerHTML = "<strong>Resultado del análisis:</strong><br>Imagen recibida correctamente. El motor de visión está listo para identificar componentes.";
            btn.disabled = false;
        }, 2000);
    }
</script>

</body>
</html>
