<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estación de Diagnóstico - Método OC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; padding: 20px; user-select: none; -webkit-user-select: none; }
        .container { max-width: 650px; margin: auto; background: #2a2a2a; padding: 25px; border-radius: 15px; border: 1px solid #ff9800; box-shadow: 0 0 20px rgba(255,152,0,0.1); }
        .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #444; padding-bottom: 15px; }
        .nav-links { display: flex; gap: 15px; }
        .btn-nav { color: #ff9800; text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 8px; cursor: pointer; background: none; border: none; font-size: 1em; padding: 0; }
        .btn-nav:hover { color: #e68a00; }
        .logo-small { max-width: 90px; height: auto; }
        h2 { text-align: center; color: #ff9800; text-transform: uppercase; margin-top: 5px; }
        label { display: block; margin-top: 15px; color: #bbb; font-weight: bold; font-size: 0.9em; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #444; background: #333; color: white; box-sizing: border-box; font-size: 1em; }
        textarea { height: 90px; resize: none; }
        button.btn-principal { width: 100%; padding: 16px; margin-top: 25px; background: #ff9800; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 1.1em; }
        button.btn-principal:hover { background: #e68a00; }
        #loading { display: none; text-align: center; margin-top: 25px; color: #ff9800; }
        #result { display: none; margin-top: 25px; padding: 25px; background: #333; border-left: 6px solid #ff9800; border-radius: 8px; line-height: 1.7; white-space: pre-wrap; color: #f0f0f0; }
        
        /* Contenedor de Botones Multimedia */
        .soporte-container { margin-top: 25px; border-top: 2px solid #444; padding-top: 20px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .btn-recurso { display: inline-flex; align-items: center; gap: 10px; color: white !important; padding: 14px 25px; text-decoration: none; border-radius: 8px; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .btn-video { background: #d32f2f; } /* Rojo */
        .btn-imagen { background: #2e7d32; } /* Verde */
        .btn-manual { background: #1976d2; } /* Azul */
        .btn-recurso:hover { transform: translateY(-3px); filter: brightness(1.2); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-nav">
        <div class="nav-links">
            <a href="index.html" class="btn-nav"><i class="fa-solid fa-house"></i> Inicio</a>
            <button onclick="cerrarSesion()" class="btn-nav"><i class="fa-solid fa-right-from-bracket"></i> Salir</button>
        </div>
        <img src="logo-oc.png" alt="Método OC" class="logo-small">
    </div>
    <h2>Estación de Diagnóstico</h2>
    <label><i class="fa-solid fa-tag"></i> Marca</label>
    <input type="text" id="marca" placeholder="Ej: Sony...">
    <label><i class="fa-solid fa-microchip"></i> Modelo</label>
    <input type="text" id="modelo" placeholder="Ej: KDL-32M3000...">
    <label><i class="fa-solid fa-tv"></i> Síntoma de la Falla</label>
    <input type="text" id="sintoma" placeholder="Ej: Imagen lenta...">
    <label><i class="fa-solid fa-screwdriver-wrench"></i> Descartes realizados</label>
    <textarea id="descartes" placeholder="Voltajes medidos..."></textarea>
    
    <button onclick="consultarIA()" class="btn-principal">
        <i class="fa-solid fa-magnifying-glass"></i> SOLICITAR DIAGNÓSTICO
    </button>

    <div id="loading"><i class="fas fa-spinner fa-spin fa-2x"></i><br><br>Buscando en la base de datos...</div>
    <div id="result"></div>
</div>

<script>
    // BLOQUEOS DE SEGURIDAD (Ya los tiene, solo asegúrese de mantenerlos)
    document.addEventListener('contextmenu', e => e.preventDefault());
    
    async function consultarIA() {
        // Obtenemos los valores de los inputs originales del buscador.html
        const marca = document.getElementById('marca').value.trim();
        const modelo = document.getElementById('modelo').value.trim();
        const sintoma = document.getElementById('sintoma').value.trim();
        const descartes = document.getElementById('descartes').value.trim();
        
        // Validaciones
        if (!marca || !modelo || !sintoma || !descartes) {
            return alert("Por favor, complete todos los campos de diagnóstico.");
        }

        const resultDiv = document.getElementById('result');
        const loading = document.getElementById('loading');

        resultDiv.style.display = 'none';
        loading.style.display = 'block';

        try {
            // Enviamos los datos al servidor
            const res = await fetch('/api/diagnostico', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ marca, modelo, sintoma, descartes })
            });
            
            const data = await res.json();
            
            // Renderizado (aquí incluimos la lógica de botones que usted ya tenía)
            // Nota: Asegúrese de que el servidor devuelva el texto en 'data.text'
            resultDiv.innerHTML = data.text; 
            
            loading.style.display = 'none';
            resultDiv.style.display = 'block';
        } catch (error) {
            loading.style.display = 'none';
            alert("Error de conexión con el servidor.");
        }
    }
</script>
</body>
</html>
