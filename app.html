<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscador Método OC</title>
    <script>
        // Guardia de seguridad: si no hay usuario, devuelve a la landing
        if(!localStorage.getItem('usuarioOC')) {
            window.location.href = 'index.html';
        }
    </script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        button { background: #ff6600; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Centro de Diagnóstico OC</h1>
        <textarea id="query" placeholder="Describa la falla..." style="width:100%; height:100px;"></textarea>
        <br><br>
        <button id="btnPrincipal" onclick="consultarIA()">SOLICITAR DIAGNÓSTICO</button>
        <div id="resultado" style="margin-top:20px;"></div>
    </div>

    <script>
        async function consultarIA() {
            const btn = document.getElementById('btnPrincipal');
            const query = document.getElementById('query').value;
            
            btn.disabled = true;
            btn.innerText = "Procesando diagnóstico...";

            try {
                const response = await fetch('/api/diagnostico', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ query: query, usuario: localStorage.getItem('usuarioOC') })
                });
                const data = await response.json();
                document.getElementById('resultado').innerText = data.respuesta;
            } catch (error) {
                document.getElementById('resultado').innerText = "Error al conectar con la IA.";
            } finally {
                btn.disabled = false;
                btn.innerText = "SOLICITAR DIAGNÓSTICO";
            }
        }
    </script>
</body>
</html>
