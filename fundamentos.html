<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundamentos OC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a1a; color: white; padding: 20px; }
        .container { max-width: 650px; margin: auto; background: #2a2a2a; padding: 25px; border-radius: 15px; border: 1px solid #ff9800; }
        .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #444; padding-bottom: 15px; }
        .btn-home { color: #ff9800; text-decoration: none; font-weight: bold; }
        h2 { text-align: center; color: #ff9800; }
        input { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #444; background: #333; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 16px; margin-top: 15px; background: #ff9800; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; }
        #result { display: none; margin-top: 25px; padding: 25px; background: #333; border-left: 6px solid #ff9800; border-radius: 8px; white-space: pre-wrap; line-height: 1.6; }
        
        /* Contenedor de Botones Multimedia */
        .soporte-container { margin-top: 25px; border-top: 2px solid #444; padding-top: 20px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .btn-recurso { display: inline-flex; align-items: center; gap: 8px; color: white !important; padding: 12px 20px; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 0.9em; transition: 0.3s; }
        .btn-video { background: #d32f2f; }
        .btn-imagen { background: #2e7d32; }
        .btn-manual { background: #1976d2; }
        .btn-recurso:hover { transform: translateY(-2px); filter: brightness(1.2); }
    </style>
</head>
<body>
<div class="container">
    <div class="header-nav">
        <a href="index.html" class="btn-home"><i class="fa-solid fa-house"></i> Inicio</a>
        <img src="logo-oc.png" alt="Método OC" style="max-width:90px;">
    </div>
    <h2>Fundamentos OC</h2>
    <input type="text" id="consulta" placeholder="Ej: ¿Qué es el corrector Gamma?">
    <button onclick="aprender()">CONSULTAR AL MAESTRO</button>
    <div id="loading" style="display:none; text-align:center; margin-top:20px;"><i class="fas fa-spinner fa-spin fa-2x" style="color:#ff9800;"></i></div>
    <div id="result"></div>
</div>

<script>
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => { if (e.key === 'F12' || (e.ctrlKey && e.key === 'u')) e.preventDefault(); });

    async function aprender() {
        const consulta = document.getElementById('consulta').value.trim();
        const resultDiv = document.getElementById('result');
        if (!consulta) return;

        resultDiv.style.display = 'none';
        document.getElementById('loading').style.display = 'block';

        try {
            const res = await fetch('/api/fundamentos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ consulta, token: localStorage.getItem('oc_token') })
            });
            const data = await res.json();
            let texto = data.text;

            // SENSORES DE BOTONES
            const regV = /VIDEO:\s*(https?:\/\/[^\s\n\r]+)/i;
            const regI = /IMAGEN:\s*(https?:\/\/[^\s\n\r]+)/i;
            const regM = /MANUAL:\s*(https?:\/\/[^\s\n\r]+)/i;

            let htmlBotones = '<div class="soporte-container">';
            let hayRecurso = false;

            [ [regV, 'btn-video', 'fa-play-circle', 'VIDEO'], 
              [regI, 'btn-imagen', 'fa-image', 'IMAGEN'], 
              [regM, 'btn-manual', 'fa-file-pdf', 'MANUAL'] ].forEach(r => {
                const m = texto.match(r[0]);
                if(m) {
                    hayRecurso = true;
                    const url = m[1].trim().replace(/[.\)\],]+$/, "");
                    texto = texto.replace(m[0], "");
                    htmlBotones += `<a href="${url}" target="_blank" class="btn-recurso ${r[1]}"><i class="fa-solid ${r[2]}"></i> ${r[3]}</a>`;
                }
            });

            resultDiv.innerHTML = texto.trim() + (hayRecurso ? htmlBotones + '</div>' : '');
            document.getElementById('loading').style.display = 'none';
            resultDiv.style.display = 'block';
        } catch (e) { alert("Error de conexión."); }
    }
</script>
</body>
</html>
