<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Método OC - Panel de Control Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- CONFIGURACIÓN DE COLORES MÉTODO OC --- */
        :root {
            --azul-profundo: #0f141c;
            --grafito-oscuro: #161a22;
            --grafito-tarjeta: #1e222b;
            --naranja-tecnico: #ff6600;
            --naranja-hover: #e65c00;
            --texto-gris: #a0a5b0;
            --borde-sutil: #2a313d;
        }

        body { 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; 
            background-color: var(--azul-profundo); 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- CONTENEDOR PRINCIPAL ESTILO DASHBOARD --- */
        .menu-container { 
            background: var(--grafito-oscuro); 
            padding: 40px; 
            border-radius: 20px; 
            border: 1px solid var(--borde-sutil); 
            text-align: center; 
            width: 90%; 
            max-width: 1050px; /* Expandido para dar el look panorámico */
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
            position: relative; 
            transition: all 0.5s ease;
        }

        /* Línea decorativa superior que simula un equipo de laboratorio */
        .menu-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--naranja-tecnico), transparent);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }

        .logo-main { 
            max-width: 160px; 
            margin-bottom: 15px; 
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.3));
        }

        h1 { 
            font-size: 1.8em; 
            color: white; 
            margin: 0 0 10px 0; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-weight: 800;
        }

        h1 span {
            color: var(--naranja-tecnico);
        }

        .descripcion-app {
            color: var(--texto-gris);
            font-size: 1em;
            margin-bottom: 35px;
            line-height: 1.6;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* --- INTERFAZ DE IDENTIFICACIÓN (BLOQUEO SEGURIDAD) --- */
        .login-box {
            background: var(--grafito-tarjeta);
            padding: 30px;
            border-radius: 14px;
            border: 1px solid var(--borde-sutil);
            max-width: 400px;
            margin: 0 auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .input-correo {
            width: 100%;
            padding: 16px;
            background: var(--azul-profundo);
            border: 1px solid var(--borde-sutil);
            border-radius: 8px;
            color: white;
            margin-bottom: 18px;
            text-align: center;
            font-size: 1.05em;
            box-sizing: border-box;
            letter-spacing: 0.5px;
            transition: 0.3s;
        }
        .input-correo:focus { 
            border-color: var(--naranja-tecnico); 
            outline: none; 
            box-shadow: 0 0 10px rgba(255, 102, 0, 0.2);
        }
        .btn-acceder {
            width: 100%;
            padding: 16px;
            background: var(--naranja-tecnico);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .btn-acceder:hover { 
            background: var(--naranja-hover); 
            transform: translateY(-2px);
        }

        /* --- GRID DE HERRAMIENTAS PANORÁMICO --- */
        .menu-grid { 
            display: none; /* Se activa dinámicamente */
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px; 
            margin-top: 10px;
        }

        .menu-item { 
            background: var(--grafito-tarjeta); 
            color: white; 
            padding: 30px 25px; 
            border-radius: 14px; 
            text-decoration: none; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            gap: 15px; 
            font-weight: bold; 
            font-size: 1.1em;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
            border: 1px solid var(--borde-sutil); 
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .menu-item:hover { 
            background: #242933; 
            border-color: var(--naranja-tecnico); 
            transform: translateY(-5px); 
            box-shadow: 0 12px 24px rgba(255, 102, 0, 0.15);
        }
        .menu-item i { 
            font-size: 2.2em; 
            color: var(--naranja-tecnico); 
            margin-bottom: 5px;
            transition: 0.3s;
        }
        .menu-item:hover i {
            transform: scale(1.15);
        }
        .menu-item span.item-desc {
            font-size: 0.8em;
            color: var(--texto-gris);
            font-weight: normal;
            margin-top: 5px;
            line-height: 1.4;
        }
        
        /* --- BOTÓN DE SALIDA --- */
        .logout-container { 
            margin-top: 35px; 
            border-top: 1px solid var(--borde-sutil); 
            padding-top: 25px; 
            display: none; 
        }
        .btn-logout { 
            background: none; 
            border: 1px solid #d32f2f; 
            color: #d32f2f; 
            padding: 12px 25px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s; 
            max-width: 200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            font-size: 0.9em;
        }
        .btn-logout:hover { background: #d32f2f; color: white; }
    </style>
</head>
<body>

<div class="menu-container">
    <img src="logo-oc.png" alt="Método OC" class="logo-main" onerror="this.style.display='none'">
    
    <h1 id="titulo-principal">MÉTODO OC - <span>PANEL DE CONTROL</span></h1>
    
    <p class="descripcion-app" id="texto-intro">
        Ecosistema de diagnóstico técnico asistido por IA. Ingresa tu correo de alumno para desbloquear las herramientas.
    </p>

    <div id="seccion-login" class="login-box">
        <input type="email" id="emailInput" class="input-correo" placeholder="correo@ejemplo.com">
        <button class="btn-acceder" onclick="identificarAlumno()">IDENTIFICARSE</button>
    </div>
    
    <div class="menu-grid" id="menuPrincipal">
        </div>

    <div class="logout-container" id="contenedorSalir">
        <button onclick="cerrarSesion()" class="btn-logout">
            <i class="fa-solid fa-right-from-bracket"></i> CERRAR SESIÓN
        </button>
    </div>
</div>

<script>
    // ⚙️ CALIBRACIÓN DE VERSIÓN: Cambie a 'true' para modo PRO (IA) o a 'false' para modo BÁSICO (Base de Datos)
    const esVersionPro = true; 

    document.addEventListener('contextmenu', e => e.preventDefault());

    // Al cargar la página, verificamos si ya conocemos al técnico
    window.onload = function() {
        configurarEstructuraPorVersión();
        const emailGuardado = localStorage.getItem('userEmail');
        if (emailGuardado) {
            mostrarMenu();
        }
    }

    function configurarEstructuraPorVersión() {
        const grid = document.getElementById('menuPrincipal');
        const titulo = document.getElementById('titulo-principal');
        const intro = document.getElementById('texto-intro');
        
        if (esVersionPro) {
            // Estructura Panorámica PRO (Tal como en la Diapositiva Pro)
            titulo.innerHTML = "MÉTODO OC - <span>ESTACIÓN DE DIAGNÓSTICO IA</span>";
            intro.innerHTML = "Ecosistema avanzado asistido por Inteligencia Artificial. Ingresa tu correo de alumno autorizado.";
            
            grid.innerHTML = `
                <a href="buscador.html" class="menu-item">
                    <i class="fa-solid fa-microchip"></i>
                    <span>Estación de Diagnóstico IA</span>
                    <span class="item-desc">Analizador inteligente de fallas con asistente de consultas directas.</span>
                </a>
                <a href="vision.html" class="menu-item">
                    <i class="fa-solid fa-eye"></i>
                    <span>Visión Artificial OC</span>
                    <span class="item-desc">Reconocimiento avanzado de componentes y tarjetas electrónicas.</span>
                </a>
                <a href="fundamentos.html" class="menu-item">
                    <i class="fa-solid fa-book-open"></i>
                    <span>Fundamentos OC</span>
                    <span class="item-desc">Manuales, procedimientos de seguridad y entrenamiento técnico.</span>
                </a>
            `;
        } else {
            // Estructura Panorámica BÁSICA (Tal como en la Diapositiva Básica)
            titulo.innerHTML = "MÉTODO OC - <span>BASE DE DATOS TÉCNICA</span>";
            intro.innerHTML = "Tu base de conocimientos centralizada para reparación de pantallas. Ingresa tu credencial.";
            
            grid.innerHTML = `
                <a href="tips.html" class="menu-item">
                    <i class="fa-solid fa-screwdriver-wrench"></i>
                    <span>Tips Técnicos</span>
                    <span class="item-desc">Consejos rápidos del banco de trabajo y soluciones exprés.</span>
                </a>
                <a href="fallas.html" class="menu-item">
                    <i class="fa-solid fa-burst"></i>
                    <span>Fichas de Fallas</span>
                    <span class="item-desc">Historial detallado de síntomas analizados y sus soluciones.</span>
                </a>
                <a href="diagramas.html" class="menu-item">
                    <i class="fa-solid fa-charging-station"></i>
                    <span>Diagramas Eléctricos</span>
                    <span class="item-desc">Planos de fuentes de poder, Main Boards y circuitos de control.</span>
                </a>
                <a href="componentes.html" class="menu-item">
                    <i class="fa-solid fa-gavel"></i>
                    <span>Componentes Clave</span>
                    <span class="item-desc">Fichas técnicas y reemplazos directos de integrados y MOSFETs.</span>
                </a>
            `;
        }
    }

    function identificarAlumno() {
        const email = document.getElementById('emailInput').value.trim().toLowerCase();
        if (email === "" || !email.includes('@')) {
            alert("Por favor, ingresa un correo válido, Maestro.");
            return;
        }
        
        localStorage.setItem('userEmail', email);
        mostrarMenu();
    }

    function mostrarMenu() {
        document.getElementById('seccion-login').style.display = 'none';
        document.getElementById('texto-intro').innerHTML = "🛠️ Bienvenido al banco de pruebas, colega. Selecciona el módulo de trabajo:";
        document.getElementById('menuPrincipal').style.display = 'grid';
        document.getElementById('contenedorSalir').style.display = 'block';
    }

    function cerrarSesion() {
        if(confirm("¿Desea cerrar su sesión de alumno, Maestro?")) {
            localStorage.removeItem('userEmail');
            location.reload();
        }
    }
</script>
</body>
</html>
