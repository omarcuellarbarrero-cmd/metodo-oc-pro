<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Método OC: Diagnóstico Universal</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary-color: #f97316; --primary-hover: #ea580c; --bg-color: #f1f5f9; --card-bg: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: #1e293b; margin: 0; padding: 20px; }
        .navbar { background-color: #0f172a; padding: 15px; border-radius: 8px; color: white; text-align: center; margin-bottom: 20px; }
        .container { max-width: 600px; margin: auto; background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        .btn-search { width: 100%; padding: 15px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-loading { background-color: #ea580c; cursor: wait; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .resultado-box { margin-top: 20px; padding: 20px; border-left: 5px solid var(--primary-color); background: #f8fafc; display: none; }
    </style>
</head>
<body>

<nav class="navbar"><h3>Método OC: Diagnóstico Universal</h3></nav>

<div class="container">
    <div class="form-group">
        <label>Tipo de Equipo:</label>
        <select id="tipoEquipo">
            <option value="TV LCD/LED">TV LCD/LED (Moderna)</option>
            <option value="TV TRC">TV TRC (Clásica)</option>
            <option value="Audio">Audio / Sonido</option>
            <option value="Otro">Otro</option>
        </select>
    </div>
    <div class="form-group"><label>Marca:</label><input type="text" id="marca"></div>
    <div class="form-group"><label>Modelo:</label><input type="text" id="modelo"></div>
    <div class="form-group"><label>Síntoma:</label><textarea id="sintoma" rows="3"></textarea></div>
    
    <button class="btn-search" id="btnConsultar" onclick="lanzarDiagnostico()">Consultar Motor de IA</button>

    <div id="resultadoBox" class="resultado-box"><div id="resultadoTexto"></div></div>
</div>

<script>
    async function lanzarDiagnostico() {
        const btn = document.getElementById('btnConsultar');
        const tipoEquipo = document.getElementById('tipoEquipo').options[document.getElementById('tipoEquipo').selectedIndex].text;
        const marca = document.getElementById('marca').value;
        const modelo = document.getElementById('modelo').value;
        const sintoma = document.getElementById('sintoma').value;

        btn.classList.add('btn-loading');
        btn.innerText = "⚡ Sintonizando Frecuencia...";
        btn.disabled = true;

        try {
            const res = await fetch('/api/diagnostico', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tipoEquipo, marca, modelo, sintoma })
            });
            const data = await res.json();
            document.getElementById('resultadoTexto').innerHTML = marked.parse(data.text);
            document.getElementById('resultadoBox').style.display = 'block';
        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            btn.classList.remove('btn-loading');
            btn.innerText = "Consultar Motor de IA";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
